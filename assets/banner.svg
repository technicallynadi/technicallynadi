<svg width="1600" height="700" viewBox="0 0 1600 700" role="img" xmlns="http://www.w3.org/2000/svg"><title>@technicallynadi, driven by curiosity, creativity, and a love of detail</title><desc>Light spec-sheet card: monospace HUD labels, the heavy display phrase DRIVEN BY CURIOSITY with a scanline treatment and black knockout circles, the handle @technicallynadi, and a positioning paragraph.</desc>
